name: Security Pipeline

on:
  push:
  pull_request:

jobs:
  security:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - uses: actions/checkout@v4

      - name: Semgrep Scan
        uses: semgrep/semgrep-action@v1

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Set Image Tag
        run: |
        echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build Inventory API Image
        run: |
          docker build \
          -t ghcr.io/${{ github.repository }}/inventory-api:latest \
          ./inventory-api


      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/inventory-api:latest
          format: table

      - name: Push Image
        run: |
          docker build \
          -t ghcr.io/${{ github.repository }}/inventory-api:${IMAGE_TAG} \
          ./inventory-api
